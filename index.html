<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Captain M</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            background-color: #050505; 
            color: #fff; 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Preloader */
        #loader-screen {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-text {
            font-family: 'Syncopate', sans-serif;
            color: #d4af37;
            letter-spacing: 5px;
            margin-top: 20px;
            font-size: 0.8rem;
        }

        /* Entry Screen */
        #entry-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000;
            display: none; /* Shown via JS */
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-out;
        }

        .start-btn {
            padding: 15px 40px;
            background: none;
            border: 2px solid #d4af37;
            color: #d4af37;
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Background */
        .bg-slider { position: fixed; inset: 0; z-index: -1; }
        .bg-img {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.3);
            opacity: 0;
            animation: kenBurns 12s infinite ease-in-out;
        }
        .img1 { background-image: url('./image1.jpg'); } 
        .img2 { background-image: url('./image2.jpg'); animation-delay: 6s; }

        @keyframes kenBurns {
            0% { opacity: 0; transform: scale(1.2); }
            15% { opacity: 1; }
            50% { opacity: 1; transform: scale(1); }
            65% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Content */
        .main-content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 12vw, 6rem);
            background: linear-gradient(to bottom, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .letter-box {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin-top: 30px;
            line-height: 1.8;
            color: #ddd;
        }

        .letter-box b { color: #d4af37; }

        #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-text">PREPARING SURPRISE...</div>
    </div>

    <div id="entry-screen">
        <button class="start-btn" onclick="startExperience()">View Surprise</button>
    </div>

    <canvas id="confetti"></canvas>

    <div class="bg-slider">
        <div class="bg-img img1"></div>
        <div class="bg-img img2"></div>
    </div>

    <div class="main-content" id="main">
