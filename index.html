<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday CAPTAIN M</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
            color: white;
            text-align: center;
        }

        /* Background Image Slider */
        .bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-img {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: imageFade 10s infinite;
        }

        /* Set Background Images */
        .img-a { background-image: url('A.jpg'); } /* Ensure image is named A.jpg */
        .img-b { background-image: url('B.jpg'); animation-delay: 5s; } /* Ensure image is named B.jpg */

        @keyframes imageFade {
            0% { opacity: 0; }
            20% { opacity: 0.4; } /* Darker overlay for text readability */
            50% { opacity: 0.4; }
            70% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Dark Overlay Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* Main Content */
        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        .bottom-text {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0.8;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: white;
            margin: 20px 0;
        }

        /* Subtle Animation for Text */
        .fade-in {
            animation: fadeInText 2s ease-in forwards;
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            h2 { font-size: 1.5rem; }
            .bottom-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="bg-slider">
        <div class="bg-img img-a"></div>
        <div class="bg-img img-b"></div>
    </div>
    <div class="overlay"></div>

    <div class="container fade-in">
        <h1>CAPTAIN M</h1>
        <h2>Happy Birthday</h2>
        
        <div class="divider"></div>

        <div class="bottom-text">Day One</div>
        <div class="bottom-text" style="margin-top: 10px;">Built Different</div>
    </div>

</body>
</html>
