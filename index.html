<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB CAPTAIN M</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: white; 
            overflow: hidden;
        }

        /* The Background Slider */
        .bg-slider {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-img {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.6); /* Makes text pop */
            opacity: 0;
            animation: crossfade 12s infinite;
        }

        /* Update these names if your files are different! */
        .img1 { background-image: url('A.jpg'); } 
        .img2 { background-image: url('B.jpg'); animation-delay: 6s; }

        @keyframes crossfade {
            0% { opacity: 0; transform: scale(1.1); }
            15% { opacity: 1; }
            50% { opacity: 1; }
            65% { opacity: 0; transform: scale(1); }
            100% { opacity: 0; }
        }

        /* Center Content */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.7));
        }

        /* Glass Card for "Effort" Look */
        .glass-card {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: float 4s ease-in-out infinite;
            text-align: center;
            max-width: 90%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: 15px;
            margin-bottom: 5px;
            line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: #ddd;
        }

        .line {
            width: 60px;
            height: 3px;
            background: #fff;
            margin: 20px auto;
            border-radius: 10px;
        }

        .sub-text {
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 15px 0;
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <div class="bg-slider">
        <div class="bg-img img1"></div>
        <div class="bg-img img2"></div>
    </div>

    <div class="container">
        <div class="glass-card">
            <h1>CAPTAIN<br>M</h1>
            <h2>Happy Birthday</h2>
            
            <div class="line"></div>

            <div class="sub-text">Day One</div>
            <div class="sub-text">Built Different</div>
        </div>
    </div>

</body>
</html>
